name: Repair missing v1.8.1 tag

# One-off, manually-triggered repair for the tag-drop incident where
# bump.yml committed "bump: version 1.8.0 -> 1.8.1" (commit dd3949b) but,
# due to a bug since fixed, never pushed the v1.8.1 tag. Remove this file
# once the tag has been created.
on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Create and push v1.8.1 if missing
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify refs/tags/v1.8.1 >/dev/null; then
            echo "v1.8.1 already exists locally after fetch — nothing to do."
            exit 0
          fi
          git tag -a v1.8.1 -m v1.8.1 dd3949b706798cd890695d3d202f37b4eb55c670
          git push origin refs/tags/v1.8.1

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest -v
